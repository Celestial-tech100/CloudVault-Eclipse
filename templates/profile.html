{% extends "dashboard_base.html" %} {% block title %}My Profile{% endblock %} {%
block dashboard_content %}

<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <h2>👤 My Profile</h2>
      <p>Manage your CloudVault Eclipse account.</p>
    </div>

    <div class="profile-info">
      <strong>Name</strong>
      <span>{{ user[1] }}</span>

      <strong>Email</strong>
      <span>{{ user[2] }}</span>

      <strong>Role</strong>
      <span>{{ user[3] }}</span>

      <strong>Member Since</strong>
      <span>{{ user[4] }}</span>
    </div>

    <div class="profile-actions">
      <a href="/change_password" class="btn-primary"> 🔒 Change Password </a>
    </div>
  </div>
</div>

{% endblock %}
