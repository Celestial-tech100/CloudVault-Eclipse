{% extends "base.html" %} {% block title %}Verify Email{% endblock %} {% block
content %}

<section class="auth-page">
  <div class="auth-card">
    <h2>Email Verification</h2>

    <p>We have sent a 6-digit verification code to your email.</p>

    <form method="POST">
      <div class="form-group">
        <label>Verification Code</label>

        <input
          type="text"
          name="otp"
          maxlength="6"
          placeholder="Enter 6-digit OTP"
          required
        />
      </div>

      <button type="submit" class="btn-primary">Verify Email</button>
    </form>

    <hr />

    <p style="text-align: center; margin-top: 15px">Didn't receive the code?</p>

    <div style="text-align: center">
      <a href="/resend-otp" class="btn-secondary"> Resend OTP </a>
    </div>
  </div>
</section>

{% endblock %}
